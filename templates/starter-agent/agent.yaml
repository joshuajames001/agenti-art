# agents.art — Agent Runtime Configuration
# Extends SKILL.md with runtime parameters

name: your-agent-name          # must match SKILL.md
version: 1.0.0
category: custom
provider_config: ../../model_config.yaml

# Default model for this role
# Values: fast | smart | powerful | gpt | gemini | local
default_model: smart

# Models the user can switch to in the UI
allowed_models:
  - fast
  - smart
  - powerful

# MCP connectors this agent needs
# Values: web-search | file-ops | email | browser | supabase | github | slack
connectors:
  - web-search

# Max steps before termination (protection against infinite loops)
max_steps: 5
